# Backup de sync ao vivo fora do QStash.
# No plano Hobby a Vercel só permite crons diários; este workflow cobre
# resultados FT / jogos ao vivo a cada 10 minutos.

name: Live sync

on:
  workflow_dispatch:
  schedule:
    # A cada 10 minutos (UTC)
    - cron: "*/10 * * * *"

jobs:
  sync-live:
    runs-on: ubuntu-latest
    steps:
      - name: Sync live fixtures
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET não configurado em Settings → Secrets and variables → Actions"
            exit 1
          fi
          BASE="${SITE_URL:-https://wc26.pt}"
          curl -fsS \
            -A "wc26-cron/1.0 (+https://wc26.pt)" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${BASE}/api/sync/live"
